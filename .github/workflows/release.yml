name: Build and Release

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    if: contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Construir el Fat JAR del Servidor
      - name: Build Server Shadow JAR
        run: ./gradlew :server:shadowJar

      # 2. Construir la Web (Wasm)
      - name: Build Web App
        run: ./gradlew :app:webApp:wasmJsBrowserDistribution

      # 3. Crear la Release en GitHub y subir el JAR
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: server/build/libs/server-all.jar
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            Release automática generada por commit.
            Servidor: server-all.jar (Listo para Pterodactyl)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Desplegar la Web a GitHub Pages
      - name: Upload Web Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'app/webApp/build/dist/wasmJs/productionExecutable'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
