name: Build and Release

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: 1.0.0.${{ github.run_number }}
    steps:
      - run: echo "Version will be 1.0.0.${{ github.run_number }}"

  create-release:
    if: contains(github.event.head_commit.message, 'RELEASE')
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create empty release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Release ${{ needs.setup.outputs.version }}
          body: |
            Releases distribuidas automáticas.

            **Artefactos:**
            - server-${{ needs.setup.outputs.version }}.jar (Ktor, para Pterodactyl)
            - impostor-${{ needs.setup.outputs.version }}.apk (Android)
            - impostor-${{ needs.setup.outputs.version }}.deb (Linux)
            - impostor-${{ needs.setup.outputs.version }}.msi (Windows)
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-server:
    if: contains(github.event.head_commit.message, 'RELEASE')
    needs: [setup, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - run: chmod +x gradlew
      - name: Build Server JAR
        run: ./gradlew :server:shadowJar
      - name: Prepare artifacts
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          mkdir -p artifacts
          # Copia versionada para GitHub Release
          cp server/build/libs/server-all.jar artifacts/server-${VERSION}.jar
          # Copia fija para Pterodactyl (sobreescribe siempre)
          cp server/build/libs/server-all.jar artifacts/server-all.jar
      - name: Upload artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: server-deploy
          path: artifacts/server-all.jar
          retention-days: 1
      - name: Upload versioned JAR to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          files: artifacts/server-${{ needs.setup.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-server:
    if: contains(github.event.head_commit.message, 'RELEASE')
    needs: [setup, build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Download server-all.jar
        uses: actions/download-artifact@v4
        with:
          name: server-deploy
          path: artifacts/

      - name: Delete old JAR
        run: |
          curl -X POST "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_UUID }}/files/delete" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"root": "/", "files": ["server-all.jar"]}'

      - name: Upload JAR to Pterodactyl
        run: |
          # 1. Pedir signed URL
          UPLOAD_URL=$(curl -s -X GET "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_UUID }}/files/upload" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Accept: application/json" \
            | jq -r '.attributes.url')

          echo "Upload URL: $UPLOAD_URL"

          # 2. Subir el JAR a esa URL
          curl -X POST "$UPLOAD_URL" \
            -F "files=@artifacts/server-all.jar"

      - name: Restart server
        run: |
          curl -X POST "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_UUID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"signal": "restart"}'

  build-android:
    if: contains(github.event.head_commit.message, 'RELEASE')
    needs: [setup, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - run: chmod +x gradlew
      - name: Build Android APK
        run: ./gradlew :app:androidApp:assembleRelease
      - name: Rename artifact
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          echo "=== Buscando APKs ==="
          find app/androidApp/build/outputs/ -name "*.apk" -type f
          APK=$(find app/androidApp/build/outputs/ -name "*.apk" -type f | head -1)
          echo "APK encontrao: $APK"
          mv "$APK" "app/androidApp/build/outputs/apk/release/impostor-${VERSION}.apk"
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          files: app/androidApp/build/outputs/apk/release/impostor-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-linux:
    if: contains(github.event.head_commit.message, 'RELEASE')
    needs: [setup, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - run: chmod +x gradlew
      - name: Build Linux DEB
        run: ./gradlew :app:desktopApp:packageDeb
      - name: Rename artifact
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          DEB=$(find app/desktopApp/build/compose/binaries/main/deb/ -name "*.deb" | head -1)
          mv "$DEB" "app/desktopApp/build/compose/binaries/main/deb/impostor-${VERSION}.deb"
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          files: app/desktopApp/build/compose/binaries/main/deb/impostor-*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-windows:
    if: contains(github.event.head_commit.message, 'RELEASE')
    needs: [setup, create-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build Windows MSI
        run: .\gradlew.bat :app:desktopApp:packageMsi
      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          MSI=$(find app/desktopApp/build/compose/binaries/main/msi/ -name "*.msi" | head -1)
          mv "$MSI" "app/desktopApp/build/compose/binaries/main/msi/impostor-${VERSION}.msi"
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          files: app/desktopApp/build/compose/binaries/main/msi/impostor-*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
